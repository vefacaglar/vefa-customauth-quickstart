name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore VefaCustomAuth.Quickstart.slnx

      - name: Build
        run: dotnet build VefaCustomAuth.Quickstart.slnx --no-restore --nologo

      - name: Smoke test
        run: scripts/smoke-test.sh
